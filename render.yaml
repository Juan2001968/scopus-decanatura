services:
  - type: web
    name: scopus-decanatura
    runtime: python
    buildCommand: pip install -r requirements.txt
    # 1 solo worker: el plan free de Render tiene 512 MB y cada worker carga
    # pandas/numpy/plotly + los DataFrames; con 2 workers el proceso rozaba el
    # límite de memoria (errores erráticos de C-extension tipo "cyfunction
    # checknull returned a result with an exception set").
    startCommand: gunicorn dashboard.index:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        # 3.11.9 = versión verificada localmente con estos mismos pines
        # (pandas 2.2.3 + numpy 1.26.4 + dash 2.18.2).
        value: "3.11.9"
